name: Publish GitHub Pages

# Controls when the action will run.
on:
  workflow_dispatch:
    inputs:
      save_data_in_github_cache:
        required: true
        type: boolean
        default: false
      data_cache_prefix:
        required: true
        type: string
        default: track_data
  workflow_call:
    inputs:
      save_data_in_github_cache:
        required: true
        type: boolean
        default: false
      data_cache_prefix:
        required: true
        type: string
        default: track_data

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5
        with:
          # if your default branches is not master, please change it here
          ref: master

      - name: Cache Data Files
        if: inputs.save_data_in_github_cache
        uses: actions/cache@v5
        with:
          path: |
            activities
            assets
            GPX_OUT
            TCX_OUT
            FIT_OUT
            Workouts
            run_page/data.db
            src/static/activities.json
            imported.json
          key: ${{ inputs.data_cache_prefix }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            ${{ inputs.data_cache_prefix }}-${{ github.sha }}-
            ${{ inputs.data_cache_prefix }}-

      # 【调整 1】先安装 pnpm（不填 version，自动读取项目 package.json 中的 packageManager）
      - name: Install pnpm
        uses: pnpm/action-setup@v4  # 官方目前稳定大版本为 v4
        with:
          run_install: false

      # 【调整 2】再设置 Node.js 环境
      - name: Setup Node.js environment
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # 【调整 3】此时 pnpm 已存在，可以安全地获取 store 路径了
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # 【调整 4】将 cache 统一升级到支持 Node 24 运行时的 v5（或者保持 v4 也行，v5 更现代）
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: PATH_PREFIX=/${{ github.event.repository.name }} pnpm build
        env:
          VITE_MAPBOX_TOKEN: ${{ vars.VITE_MAPBOX_TOKEN }}

      # 【调整 5】顺手将上传插件升级到最新的 v4 大版本
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload dist repository
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
